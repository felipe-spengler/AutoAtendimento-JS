<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sucesso | Luxury</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .finish-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            filter: brightness(0.3);
            z-index: -1;
        }
        .success-box {
            text-align: center;
            padding: 4rem;
            max-width: 800px;
        }
        .quarto-numero {
            font-size: 8rem;
            font-weight: 700;
            line-height: 1;
            margin: 1rem 0;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .instruction {
            font-size: 1.5rem;
            color: var(--text-muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div id="background" class="finish-bg"></div>
    <div class="screen">
        <div class="success-box glass-card animate-in">
            <p class="instruction" style="color: var(--accent-color);">Reserva Confirmada</p>
            <h1 style="font-size: 2rem; margin-top: 1rem;">DIRIJA-SE AO QUARTO</h1>
            <div id="quartoDisplay" class="quarto-numero">--</div>
            <p id="tipoDisplay" style="font-size: 1.2rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.2em;">---</p>
            
            <div style="margin-top: 3rem; padding: 2rem; border-top: 1px solid var(--glass-border);">
                <p id="periodoDisplay" style="font-weight: 700;"></p>
                <p id="valorDisplay" style="color: var(--accent-color); font-size: 1.2rem; margin-top: 0.5rem;"></p>
            </div>
        </div>
        
        <div id="status-msg" style="position: fixed; bottom: 40px; color: var(--text-muted); font-size: 0.8rem;">Enviando comando para o portão...</div>
    </div>

    <script>
        function getParams() {
            return new URLSearchParams(window.location.search);
        }

        async function init() {
            const params = getParams();
            const numero = params.get('quarto');
            const periodo = params.get('periodo');
            const valor = params.get('valor');
            const desconto = params.get('desconto') || 0;

            if (numero) {
                document.getElementById('quartoDisplay').innerText = numero;
                document.getElementById('periodoDisplay').innerText = `PERMANÊNCIA: ${periodo}`;
                document.getElementById('valorDisplay').innerText = `VALOR TOTAL: R$ ${parseFloat(valor).toFixed(2)}`;

                try {
                    const statusMsg = document.getElementById('status-msg');
                    statusMsg.innerText = 'Liberando quarto...';

                    const periodoFormatado = periodo.replace(/\s+/g, '-');
                    const comando = `locar ${numero} ${periodoFormatado} ${desconto}`;
                    
                    console.log("Enviando comando unificado:", comando);
                    
                    const response = await fetch('/enviar-comando', {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain' },
                        body: comando
                    });

                    if (response.ok) {
                        const result = await response.json();
                        if (result.via === 'http' || result.via === 'ambos') {
                            statusMsg.innerText = '✅ Quarto liberado com sucesso!';
                        } else {
                            statusMsg.innerText = '📡 Liberado via comando remoto (MQTT).';
                        }
                    } else {
                        statusMsg.innerHTML = '⚠️ Falha de comunicação com a recepção.<br><strong style="color: var(--accent-color); font-size: 1rem; display: block; margin-top: 5px;">Por favor, acione o interfone para liberação manual!</strong>';
                    }
                } catch (err) {
                    console.error('Erro ao enviar comando:', err);
                    statusMsg.innerHTML = '⚠️ Instabilidade na rede local.<br><strong style="color: var(--accent-color); font-size: 1rem; display: block; margin-top: 5px;">Por favor, acione o interfone para falar com a recepção!</strong>';
                }
            }


            // Redirect back home after 20s
            setTimeout(() => {
                window.location.href = 'home.html';
            }, 20000);
        }

        init();
    </script>
</body>
</html>
