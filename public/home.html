<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bem-vindo | Motel Premium</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .welcome-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            filter: brightness(0.4);
            z-index: -1;
            transition: transform 10s ease;
        }
        body:hover .welcome-bg {
            transform: scale(1.1);
        }
        .welcome-content {
            text-align: center;
            z-index: 1;
        }
        .logo {
            font-size: 4rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 1rem;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .tap-to-start {
            font-size: 1.2rem;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-top: 2rem;
            animation: breathe 2s infinite ease-in-out;
        }
        @keyframes breathe {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body onclick="window.location.href='main.html'">
    <div id="background" class="welcome-bg"></div>
    <div class="screen">
        <div class="welcome-content animate-in">
            <img src="logo.png" alt="Motel Intensy" style="max-width: 500px; margin-bottom: 2rem;">
            <p style="letter-spacing: 0.3em; color: var(--text-muted); font-size: 1.2rem;">AUTOATENDIMENTO</p>
            <div class="tap-to-start">Toque para Iniciar</div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            fetch('/imagem/fundoAbertura')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('background').style.backgroundImage = `url(${data.imagem})`;
                })
                .catch(err => console.error('Erro ao carregar fundo:', err));
        });
    </script>
</body>
</html>
